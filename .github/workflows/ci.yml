name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies (wechat-article-monitor)
      run: cd skills/wechat-article-monitor && npm install

    - name: Install dependencies (xiaohongshu-collector)
      run: cd skills/xiaohongshu-collector && npm install

    - name: Syntax check
      run: |
        node -c skills/wechat-article-monitor/src/index.js
        node -c skills/wechat-article-monitor/src/monitor.js
        node -c skills/wechat-article-monitor/src/storage.js
        node -c skills/wechat-article-monitor/src/notifier.js
        node -c skills/xiaohongshu-collector/src/index.js
        node -c skills/xiaohongshu-collector/src/collector.js
        node -c skills/xiaohongshu-collector/src/analyzer.js
        node -c skills/xiaohongshu-collector/src/exporter.js

    - name: Verify files exist
      run: |
        test -f "skills/wechat-article-monitor/package.json"
        test -f "skills/xiaohongshu-collector/package.json"
        test -f "skills/wechat-article-monitor/SKILL.md"
        test -f "skills/xiaohongshu-collector/SKILL.md"
